{% assign publications = include.publications %}
<div class="my-3 p-0 bg-white shadow-sm rounded-sm">
    <h6 class="border-bottom border-gray p-3 mb-0">
        {% if include.title %}{{ include.title }}{% else %}<i class="fas fa-star"></i> (Co-)First Author Publications{% endif %} 
        <a href="publications">(view all <i class="fas fa-angle-double-right"></i>)</a>
    </h6>
    <div class="publication-filters px-3 pt-3" role="group" aria-label="Filter selected publications by research area">
        <button type="button" class="publication-filter active" data-filter="all" aria-pressed="true">All Topics</button>
        <button type="button" class="publication-filter" data-filter="reconstruction" aria-pressed="false">3D Reconstruction</button>
        <button type="button" class="publication-filter" data-filter="understanding" aria-pressed="false">3D Understanding</button>
        <button type="button" class="publication-filter" data-filter="agent" aria-pressed="false">Spatial Agent</button>
    </div>
    {% for item in publications limit:include.limit %}
        <div class="publication-filter-item" data-category="{{ item.category }}">
            {% include widgets/publication_item.html item=item %}
        </div>
    {% endfor %}
    <h6 class="d-block p-3 mt-0 text-right">
        <a href="publications">All publications <i class="fas fa-angle-double-right"></i></a>
    </h6>
</div>
